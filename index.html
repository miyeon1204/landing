<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이칸저칸 | 스마트 지하철 커뮤니티</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #FF8C00; 
            --bg: #FFFFFF;
            --text: #1D1D1F;
            --grey: #86868B;
            --light-grey: #F5F5F7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; word-break: keep-all; }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #FFF5EB 0%, #FFFFFF 100%);
            overflow: hidden;
        }

        /* 열차 애니메이션 */
        .train-container {
            position: absolute;
            width: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .train-img {
            width: 800px; /* 열차 크기 */
            filter: hue-rotate(20deg) saturate(1.5); /* 노란색 -> 주황색 변환 */
            animation: trainMove 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes trainMove {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(150%); }
        }

        /* 서비스명 강조 */
        .hero-content {
            opacity: 0;
            text-align: center;
            animation: fadeIn 1s ease forwards;
            animation-delay: 1.8s; /* 열차가 중간쯤 지나갔을 때 등장 */
        }

        .service-name {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -4px;
            margin-bottom: 10px;
            display: block;
        }

        .hero h1 { font-size: 1.8rem; font-weight: 700; color: #333; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI Feature Section --- */
        .features { padding: 120px 10%; background: var(--bg); }
        .feature-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 150px;
            gap: 50px;
        }
        .feature-item.reverse { flex-direction: row-reverse; }

        .feature-text { flex: 1; }
        .feature-text h2 { 
            font-size: 2.5rem; 
            color: var(--primary); 
            margin-bottom: 20px; 
            font-weight: 800;
        }
        .feature-text p { font-size: 1.2rem; color: var(--grey); line-height: 1.6; }

        /* UI Mockup */
        .ui-mockup {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }
        .phone-frame {
            width: 320px;
            height: 650px;
            background: #fff;
            border: 12px solid #1d1d1f;
            border-radius: 45px;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1);
        }
        .phone-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 프레임에 꽉 차게 */
        }

        footer {
            padding: 60px;
            text-align: center;
            background: var(--light-grey);
            font-weight: 600;
            color: var(--grey);
        }

        @media (max-width: 900px) {
            .service-name { font-size: 4rem; }
            .feature-item, .feature-item.reverse { flex-direction: column; text-align: center; }
            .phone-frame { width: 280px; height: 580px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="train-container">
            <img src="image_f07307.png" class="train-img" alt="Subway Train">
        </div>
        
        <div class="hero-content">
            <span class="service-name">이칸저칸</span>
            <h1>더 나은 지하철 이용의 시작</h1>
        </div>
    </section>

    <section class="features">
        <div class="feature-item">
            <div class="feature-text">
                <h2>실시간 칸별 상황 공유</h2>
                <p>에브리타임의 흩어진 정보를 한곳에!<br>지금 내가 탈 칸의 온도와 혼잡도를 유저들의 실시간 제보로 확인하세요.</p>
            </div>
            <div class="ui-mockup">
                <div class="phone-frame">
                    <img src="image_f06b87.png" alt="UI Screenshot">
                </div>
            </div>
        </div>

        <div class="feature-item reverse">
            <div class="feature-text">
                <h2>공식보다 빠른 지연 알림</h2>
                <p>갑작스러운 열차 지연, 당황하지 마세요.<br>유저 제보 기반 알림과 공식 지연 증명서 연동으로 스마트하게 대처하세요.</p>
            </div>
            <div class="ui-mockup">
                <div class="phone-frame">
                    <img src="image_f06b87.png" alt="UI Screenshot">
                </div>
            </div>
        </div>

        <div class="feature-item">
            <div class="feature-text">
                <h2>최적 하차 칸 안내</h2>
                <p>목적지 출구까지 가장 빠른 길.<br>실시간 데이터를 바탕으로 환승과 하차에 가장 유리한 '칸'을 콕 집어 알려드립니다.</p>
            </div>
            <div class="ui-mockup">
                <div class="phone-frame">
                    <img src="image_f06b87.png" alt="UI Screenshot">
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 Team 썹타는중 | 이칸저칸</p>
    </footer>

</body>
</html>
